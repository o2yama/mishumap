<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ミシュマップ / MishuMap</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="alternate" hreflang="ja" href="https://o2yama.github.io/mishumap/ja/" />
    <link rel="alternate" hreflang="en" href="https://o2yama.github.io/mishumap/en/" />
    <script>
      // 言語別パスへの振り分け: 前回の選択（localStorage）> ブラウザ言語
      (function () {
        // devサーバーのSPAフォールバック等で言語パス配下にこのページが出た場合は
        // 二重リダイレクトになるため何もしない（無限ループ防止）
        if (/\/(ja|en)(\/|$)/.test(location.pathname)) return;
        var saved = null;
        try {
          saved = localStorage.getItem("bgm-lang");
        } catch (e) {}
        var lang =
          saved === "ja" || saved === "en"
            ? saved
            : (navigator.language || "").toLowerCase().indexOf("ja") === 0
              ? "ja"
              : "en";
        location.replace("./" + lang + "/");
      })();
    </script>
  </head>
  <body>
    <p style="font-family: sans-serif; padding: 24px">
      <a href="./ja/">日本語</a> / <a href="./en/">English</a>
    </p>
  </body>
</html>
